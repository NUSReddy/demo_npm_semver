name: Feature Build

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write

concurrency:
  group: feature-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-feature:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all branches
        run: git fetch origin "+refs/heads/*:refs/remotes/origin/*"

      - name: Validate target version
        run: bash scripts/validate-feature-version.sh

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Bump snapshot version
        run: bash scripts/bump-snapshot-version.sh

      - name: Commit snapshot version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git diff --cached --quiet || git commit -m "chore: update snapshot version [skip ci]"
          git push