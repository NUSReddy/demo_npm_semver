name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-main:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Validate version ahead of latest tag
        run: |
          INCOMING_VERSION=$(node -p "require('./package.json').version")
          CLEAN_VERSION="${INCOMING_VERSION%%-*}"
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1 || true)
          if [[ -z "$LATEST_TAG" ]]; then
            echo "No existing tags found, skipping version-ahead check"
            exit 0
          fi
          LATEST_VERSION="${LATEST_TAG#v}"
          IS_GREATER=$(python3 -c "
          import sys
          def parse(v): return tuple(map(int, v.split('.')))
          print('true' if parse(sys.argv[1]) >= parse(sys.argv[2]) else 'false')
          " "$CLEAN_VERSION" "$LATEST_VERSION")
          if [[ "$IS_GREATER" != "true" ]]; then
            echo "Error: incoming version ${CLEAN_VERSION} is not ahead of latest tagged release ${LATEST_VERSION}"
            echo "This merge would downgrade the release version. Aborting."
            exit 1
          fi
          echo "Version-ahead check passed: ${CLEAN_VERSION} >= ${LATEST_VERSION}"

      - name: Normalize release version
        run: bash scripts/strip-snapshot-version.sh

      - name: Commit normalized version if needed
        run: |
          CLEAN_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: normalize release version ${CLEAN_VERSION} [skip ci]"
            git push
          else
            echo "No package.json normalization changes to commit"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CLEAN_VERSION="${VERSION%%-*}"
          echo "version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag $TAG already exists. Duplicate release version detected."
            exit 1
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"